version: "3.8"

services:
  # ── Vector Store ──────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - 6333:6333
      - 6334:6334
    volumes:
      - .qdrant_data:/qdrant/storage:z
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET / HTTP/1.0\r\n\r\n' >&3 && cat <&3 | grep -q qdrant",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── API ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - 8000:8000
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./apps/api/src:/app/apps/api/src

  # ── Streamlit App ──────────────────────────────────────────────────────────
  streamlit-app:
    build:
      context: .
      dockerfile: apps/chatbot_ui/Dockerfile
    ports:
      - 8501:8501
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000/rag/
    depends_on:
      - api
    restart: unless-stopped
    volumes:
      - ./apps/chatbot_ui:/app/apps/chatbot_ui

networks:
  default:
    name: hephaestus-network
