version: "3.8"

services:
  # ── Vector Store ──────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - 6333:6333
      - 6334:6334
    volumes:
      - .qdrant_data:/qdrant/storage:z
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET / HTTP/1.0\r\n\r\n' >&3 && cat <&3 | grep -q qdrant",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── API ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - 8000:8000
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - PG_URL=postgresql://langgraph_user:langgraph_password@postgres:5432/langgraph_db
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./apps/api/src:/app/apps/api/src

  # ── Streamlit App ──────────────────────────────────────────────────────────
  streamlit-app:
    build:
      context: .
      dockerfile: apps/chatbot_ui/Dockerfile
    ports:
      - 8501:8501
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000/rag/
    depends_on:
      - api
    restart: unless-stopped
    volumes:
      - ./apps/chatbot_ui:/app/apps/chatbot_ui

  # ── Postgres ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - 5433:5432
    environment:
      POSTGRES_DB: langgraph_db
      POSTGRES_USER: langgraph_user
      POSTGRES_PASSWORD: langgraph_password
      PGDATA: /var/lib/postgresql/data/pgdata
    restart: unless-stopped
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

    # ── MCP ──────────────────────────────────────────────────────────
  db-mcp-server:
    build:
      context: .
      dockerfile: apps/db_mcp_server/Dockerfile
    ports:
      - 8001:8001
    env_file:
      - .env
    environment:
      - PG_URL=postgresql://langgraph_user:langgraph_password@postgres:5432/langgraph_db
    depends_on:
      postgres:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./apps/db_mcp_server/src:/app/apps/db_mcp_server/src

networks:
  default:
    name: hephaestus-network
